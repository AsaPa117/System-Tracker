         const i = 0;
         const remain = 0;  
         const string = "bar"
         if (i != 0){
            for (;i < 0; i++){
               id = string+i; 
               drawFillBar(id); 
            }
         }
         else (remain != 0)
         {
            for(; remain > 0; remain--)
            {
               id = string+1; 
               drawEmptyBar(id); 
            }
         }
      </script>

<script>
function drawFillBar(id){
   const canvas = document.getElementbyID(id); 
   const ctx = canvas.getContext("2d"); 
   ctx.fillStyle = "rgb(102, 255, 102)"; 
   ctx.fillRect(0, 0, canvas.width, canvas.height);
}

function drawEmptyBar(id){
   const canvas = document.getElementById(id); 
   const ctx = canvas.getContext("2d"); 
   ctx.strokeStyle = "rgb(102, 255, 102)"; 
   ctx.lineWidth = 5; 
   ctx.strokeRect(0, 25, canvas.width, canvas.height); 
}
</script>

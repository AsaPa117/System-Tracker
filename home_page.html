<!--Everyting under <style> is css-->
<style> 
   @font-face{
   font-family: 'GreenScreenFont'; 
    src: url('./Share-TechMono.ttf');
   }

body{
    font-family: 'GreenScreenFont';
    font-size: 18px;
    background-color: rgb(0, 0, 0);
    color:rgb(51, 255, 51);
    border: none; 
}

</style>

<html>
   <head>
   </head>
   <body>
      <h1>Task Manager</h1>

      <label for="client_select">SELECT_CLIENT: </label>
      <select id="client_select"></select>
      <div id="panels_container"></div>

      <h2>CPU:</h2> 
      <div id="cpu_bars" style="display: flex; gap: 4px;"></div>
      <script>
         //create 50 bars (canvas)
         const container = document.getElementById("cpu_bars"); 
         for (let i = 1; i <= 50; i++){
            const canvas = document.createElement("canvas");
            canvas.id = "bar" + i; 
            canvas.width = 7; 
            canvas.height = 15; 
            container.appendChild(canvas); 
         }
      </script>
      <span id="display_cpu"></span>

      <h2>Memory:</h2>
      <div style="display: flex; align-items: center; gap: 10px;">
      <canvas id="piChart" width="200" height="200"></canvas>
      <div style="display: flex; flex-direction: column; gap: 10px;">
         <span id="display_mem_used"></span>
         <span id="display_mem_stat_used"></span>
         <span id="display_mem__stat_avail"></span>
      </div>
      </div>

      <h2>NETWORK_STAT:</h2>
      <div style="display: flex; flex-direction: column; gap: 5px;">
      <span id="display_net_sent"></span>
      <span id="display_net_rec"></span>
      </div>


      <script>
         function drawFillBar(id){
            const canvas = document.getElementById(id); 
            const ctx = canvas.getContext("2d"); 
            ctx.fillStyle = "rgb(102, 255, 102)"; 
            ctx.fillRect(0, 0, canvas.width-2, canvas.height);
         }

         function drawEmptyBar(id){
            const canvas = document.getElementById(id); 
            const ctx = canvas.getContext("2d"); 
            ctx.strokeStyle = "rgb(102, 255, 102)"; 
            ctx.lineWidth = 1; 
            ctx.strokeRect(1, 1, canvas.width-2, canvas.height-2); 
         }

         function displayPerc(id, num){
            document.getElementById(id).textContent = num + "%";
         }

         function drawPieChart(id, percentage){
            const canvas = document.getElementById(id);  
            const ctx = canvas.getContext("2d"); 
            
            ctx.beginPath(); 
            ctx.arc(canvas.width/2, canvas.height/2, 100, 0, 2 * Math.PI); 
            ctx.strokeStyle = "rgb(102, 255, 102)"; 
            ctx.stroke(); 

            ctx.beginPath(); 
            ctx.moveTo(canvas.width/2, canvas.height/2); 
            ctx.arc(canvas.width/2, canvas.height/2, 100, -Math.PI/2, -Math.PI/2 + (percentage/100) * 2 * Math.PI);
            ctx.closePath();
            ctx.fillStyle = "rgb(102, 255, 102)"; 
            ctx.fill();  
         }

         function display_stat(id, type, num){
            switch(type){
               case "memory_used":
                  document.getElementById(id).textContent = "Memory Used: " + num; 
                  break;   
               case "memory_available":
                  document.getElementById(id).textContent = "Memory Available: " + num;
                  break;
               case "network_recieved": 
                  document.getElementById(id).textContent = "Net Recieved: " + num; 
                  break; 
               case "network_sent":
                  document.getElementById(id).textContent = "Net Sent: " + num;
                  break;
            }
         }
      </script>

      <script>
         function updateDisplay(){
            //CPU DISPLAY 
            const total = 50; 
            const filled = Math.round(stats.cpu / 2); 
            const unfilled = total - filled;  
            const string = "bar";
            
            //clear all bar
            for (let i=1; i <= total; i++){
               const canvas = document.getElementById("bar" + i); 
               const ctx = canvas.getContext("2d"); 
               ctx.clearRect(0, 0, canvas.width, canvas.height); 
            }

            if (filled != 0){
               for (let i = 1; i <= filled; i++){
                  let id = string + i; //parse "bar" with number 
                  drawFillBar(id); 
               }
            }
            if (unfilled != 0){
               for(let x = filled + 1; x <= total; x++){
                  let id = string + x; 
                  drawEmptyBar(id); 
               }
            }

            displayPerc("display_cpu", stats.cpu);

            //MEM DISPLAY
            const memory_used = stats.mem_total - stats.mem_available; 
            const mem_perc = Math.round((memory_used/stats.mem_total) * 100); 
            const ctx = document.getElementById("piChart").getContext("2d");
            ctx.clearRect(0, 0, 200, 200); // clear old pie chart before redrawing   

            drawPieChart("piChart", mem_perc); 
            displayPerc("display_mem_used", mem_perc);
            display_stat("display_mem_stat_used", "memory_used", memory_used);
            display_stat("display_mem__stat_avail", "memory_available", stats.mem_available); 

            //Net DISPLAY
            display_stat("display_net_sent", "network_sent", stats.net_sent);
            display_stat("display_net_rec", "network_recieved", stats.net_recieved);
         }
      </script>

      <script>
         const clients = [{name: "Ahron PC", ip: "172.20.10.5"}, {name: "Ashton laptop", ip: "172.20.10.7"},];  //a list of clients
      </script>

      <script>
         const select = document.getElementById("client_select");
         for (let i = 0; i < clients.length; i++){
            const option = document.createElement("option");
            option.value = i;                      // 0 for Ahron, 1 for Ashton
            option.textContent = clients[i].name;  // what the user sees
         select.appendChild(option);
}      </script>

      <script>
         const stats = {
            cpu: 0, 
            mem_total: 0, 
            mem_available: 0, 
            net_sent: 0, 
            net_recieved: 0
         }

         current = null; 
         async function main(ip){
            //stop the previous stream before starting a new one. (Prevent flickering when transition to a different pc)
            if (current){
               await current.cancel(); 
               current = null; 
            }
            
            const response = await fetch("http://"+ip+":5555/stats"); //asking rquest from server of client device ip through server port 5555
            const raw_data = response.body.getReader(); // .body is the raw data but getReader holds the actualy bytes of data
            
            while(true){
               const recieved_data = await raw_data.read(); //Obtain the actual bytes
               const message = recieved_data.value; 
               const line = new TextDecoder().decode(message); //convert bytes to string
               
               // split by newline in case multiple JSON chunks arrive at once
               const lines = line.split('\n').filter(l => l.trim() !== '');
               if (lines.length === 0) continue; 
               const data = JSON.parse(lines[lines.length - 1]); // take the latest one
               
               stats.cpu = data.cpu; 
               stats.mem_available = data.mem_available; 
               stats.mem_total = data.mem_total; 
               stats.net_recieved = data.net_recv; 
               stats.net_sent = data.net_sent; 

               updateDisplay(); 
            }
         }

      function onClientChange(){
          main(clients[this.value].ip); 
         }
         select.addEventListener("change", onClientChange);      
         
      main(clients[0].ip); // start the program with first client
      </script>
   </body>
</html>

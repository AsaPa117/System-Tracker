<script>
function drawFillBar(id){
   const canvas = document.getElementById(id); 
   const ctx = canvas.getContext("2d"); 
   ctx.fillStyle = "rgb(102, 255, 102)"; 
   ctx.fillRect(0, 0, canvas.width-2, canvas.height);
}

function drawEmptyBar(id){
   const canvas = document.getElementById(id); 
   const ctx = canvas.getContext("2d"); 
   ctx.strokeStyle = "rgb(102, 255, 102)"; 
   ctx.lineWidth = 3; 
   ctx.strokeRect(1, 1, canvas.width-2, canvas.height-2); 
}

function displayPerc(id, num){
   document.getElementById(id).textContent = num + "%";
}

function drawPieChart(id, percentage){
   const canvas = document.getElementById(id);  
   const ctx = canvas.getContext("2d"); 
   
    ctx.beginPath(); 
    ctx.arc(canvas.width/2, canvas.height/2, 100, 0, 2 * Math.PI); 
    ctx.strokeStyle = "rgb(102, 255, 102)"; 
    ctx.stroke(); 

    ctx.beginPath(); 
    ctx.moveTo(canvas.width/2, canvas.height/2); 
    ctx.arc(canvas.width/2, canvas.height/2, 100, -Math.PI/2, -Math.PI/2 + (percentage/100) * 2 * Math.PI);
    ctx.closePath();
    ctx.fillStyle = "rgb(102, 255, 102)"; 
    ctx.fill();  
}

function display_stat(id, type, num){
   switch(type){
      case "memory_used":
         document.getElementById(id).textContent = "Memory Used: " + num; 
         break;   
      case "memory_available":
         document.getElementById(id).textContent = "Memory Available: " + num;
      case "network_recieved": 
         document.getElementById(id).textContent = "Net Recieved: " + num; 
         break; 
      case "network_sent":
         document.getElementById(id).textContent = "Net Sent: " + num;
         break;
   }
}
</script>

      <canvas id= "bar10" width= 27 height= 25></canvas>
      <span id="display_cpu"></span>
      <script>
         const CPU = 50
         const total = 10; 
         const filled = CPU / 10; 
         const unfilled = total - filled;  
         const string = "bar"
         if (filled != 0){
            for (i = 1;i <= filled; i++){
               id = string+i; //parse "bar" with number 
               drawFillBar(id); 
            }
         }
         if (unfilled != 0)
         {
            for(x = filled + 1; x <= total; x++)
            {
               id = string+x; 
               drawEmptyBar(id); 
            }
         }
         displayPerc("display_cpu", CPU);
      </script>

      <h2>Memory:</h2>

<!--Everyting under <style> is css-->
<style> 
   @font-face{
   font-family: 'GreenScreenFont'; 
    src: url('./perfect-dos-vga-437-cdnfonts/Perfect_DOS_VGA_437.ttf');
   }

body{
    font-family: 'GreenScreenFont';
    font-size: 18px;
    background-color: rgb(12, 12, 12);
    color:rgb(102, 255, 102);
    border: none; 
}
</style>

<script>
function drawFillBar(id){
   const canvas = document.getElementById(id); 
   const ctx = canvas.getContext("2d"); 
   ctx.fillStyle = "rgb(102, 255, 102)"; 
   ctx.fillRect(0, 0, canvas.width-2, canvas.height);
}

function drawEmptyBar(id){
   const canvas = document.getElementById(id); 
   const ctx = canvas.getContext("2d"); 
   ctx.strokeStyle = "rgb(102, 255, 102)"; 
   ctx.lineWidth = 3; 
   ctx.strokeRect(1, 1, canvas.width-2, canvas.height-2); 
}

function displayNum(id, num){
   document.getElementById(id).textContent = num + "%";
}

function drawPieChart(id, percentage){
   const canvas = document.getElementById(id); 
   const ctx = canvas.getContext("2d"); 
   
    ctx.beginPath(); 
    ctx.arc(canvas.width/2, canvas.height/2, 100, 0, 2 * Math.PI); 
    ctx.strokeStyle = "rgb(102, 255, 102)"; 
    ctx.stroke(); 

    ctx.beginPath(); 
    ctx.moveTo(canvas.width/2, canvas.height/2); 
    ctx.arc(canvas.width/2, canvas.height/2, 100, -Math.PI/2, -Math.PI/2 + (percentage/100) * 2 * Math.PI);
    ctx.closePath();
    ctx.fillStyle = "rgb(102, 255, 102)"; 
    ctx.fill();  
}
</script>

   <body>
      <h1>Task Manager</h1>

      <h2>CPU:</h2> 
      <canvas id= "bar1" width= 27 height= 25></canvas>
      <canvas id= "bar2" width= 27 height= 25></canvas>
      <canvas id= "bar3" width= 27 height= 25></canvas>
      <canvas id= "bar4" width= 27 height= 25></canvas>
      <canvas id= "bar5" width= 27 height= 25></canvas>
      <canvas id= "bar6" width= 27 height= 25></canvas>
      <canvas id= "bar7" width= 27 height= 25></canvas>
      <canvas id= "bar8" width= 27 height= 25></canvas>
      <canvas id= "bar9" width= 27 height= 25></canvas>
      <canvas id= "bar10" width= 27 height= 25></canvas>
      <span id="display_cpu"></span>
      <script>
         const CPU = 50
         const total = 10; 
         const filled = CPU / 10; 
         const unfilled = total - filled;  
         const string = "bar"
         if (filled != 0){
            for (i = 1;i <= filled; i++){
               id = string+i; //parse "bar" with number 
               drawFillBar(id); 
            }
         }
         if (unfilled != 0)
         {
            for(x = filled + 1; x <= total; x++)
            {
               id = string+x; 
               drawEmptyBar(id); 
            }
         }
         displayNum("display_cpu", CPU);
      </script>

      <h2>Memory:</h2>
      <canvas id= "piChart" width = "200" height = "200"></canvas>
      <span id="display_memory_used"></span>
      <script> 
         memory_used = 76; 
         drawPieChart("piChart", memory_used); 
         displayNum("display_memory_used", memory_used)
      </script>
